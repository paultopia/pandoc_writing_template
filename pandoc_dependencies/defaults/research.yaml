standalone: true
pdf-engine: xelatex
strip-comments: true
citeproc: true
csl: chicago-author-date
filters:
  - current-date.lua
  - fix-possessives.lua
table-of-contents: true
toc-depth: 3
number-sections: false
variables:
  geometry: margin=1.2in
  header-includes:
    - \usepackage{setspace}
    - \onehalfspacing


